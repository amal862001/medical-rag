services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      HF_HOME: /app/.cache/huggingface
      TRANSFORMERS_CACHE: /app/.cache/huggingface
    volumes:
      - ./data:/app/data
      - ./raw_pdfs:/app/raw_pdfs
      - huggingface_cache:/app/.cache/huggingface
    restart: unless-stopped

volumes:
  huggingface_cache:

